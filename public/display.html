<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display — SWAY</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { overflow: hidden; cursor: none; background: #050510; }
    body::before { display: none; }
    .display-fullscreen { display: flex; flex-direction: column; height: 100vh; background: #050510; }

    /* ── Top bar: truly centered meet name with timer on right ── */
    .display-top { position: relative; display: flex; align-items: center; justify-content: center; padding: 14px 40px 12px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .display-top-center { text-align: center; }
    .display-meet-name { font-family: 'Outfit'; font-weight: 900; font-size: 2.2rem; color: var(--text-primary); letter-spacing: -0.5px; line-height: 1.1; }
    .display-lift-info { color: var(--accent-secondary); font-family: 'Roboto Condensed'; font-size: 0.9rem; font-weight: 700; margin-top: 3px; text-transform: uppercase; letter-spacing: 1px; }
    .display-timer-corner { position: absolute; right: 40px; font-family: 'Outfit'; font-weight: 900; font-size: 3.2rem; }

    /* ── Main body: centered column layout ── */
    .display-body { flex: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 40px; gap: 8px; min-height: 0; }
    .display-body-left { display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; }
    .display-body-right { position: absolute; right: 40px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 16px; }

    /* ── Rack height badge ── */
    .rack-height-badge {
      display: flex; flex-direction: column; align-items: center;
      background: rgba(255,255,255,0.06);
      border: 2px solid var(--accent-primary);
      border-radius: var(--radius-md);
      padding: 12px 28px;
      min-width: 140px;
    }
    .rack-height-label { font-family: 'Roboto Condensed'; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 2px; }
    .rack-height-value { font-family: 'Outfit'; font-weight: 900; font-size: 2.8rem; color: var(--accent-secondary); line-height: 1; }
    .rack-extra-info { font-family: 'Roboto Condensed'; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-primary); margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 6px; width: 100%; text-align: center; }
    .rack-height-badge.no-rack { display: none; }

    /* ── Bottom bar: On Deck | Flight Order + Division | In the Hole ── */
    .display-bottom { 
      display: grid; 
      grid-template-columns: 220px 1fr 220px; 
      padding: 10px 40px 18px; 
      gap: 24px; 
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .display-bottom-info {
      text-align: center;
    }
    .display-bottom-info .section-label {
      font-family: 'Roboto Condensed'; 
      font-size: 0.65rem; 
      color: var(--text-muted); 
      text-transform: uppercase; 
      letter-spacing: 1px; 
      margin-bottom: 3px;
    }
    .flight-division-tag {
      font-family: 'Roboto Condensed';
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent-secondary);
      margin-bottom: 5px;
    }
    .mini-order-row {
      font-size: 0.78rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Decision flash overlay — full-screen takeover ── */
    .display-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; pointer-events: none;
      opacity: 0; transition: opacity 0.6s ease;
    }
    .display-overlay.show { opacity: 1; }

    .decision-flash {
      font-family: 'Outfit'; font-weight: 900;
      font-size: 8rem; line-height: 1;
      letter-spacing: -2px;
    }
    .takeover-lifter-name {
      font-family: 'Outfit'; font-weight: 800;
      font-size: 3.5rem;
      margin-bottom: -10px;
    }
    .takeover-ref-lights {
      display: flex; gap: 60px;
      margin-top: 40px; margin-bottom: 20px;
    }
    .takeover-ref-group {
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
    }
    .takeover-ref-label {
      font-family: 'Roboto Condensed'; font-weight: 700;
      font-size: 0.85rem; text-transform: uppercase;
      letter-spacing: 2px; opacity: 0.6;
    }
    .decision-countdown {
      font-family: 'Outfit'; font-weight: 700;
      font-size: 1.2rem;
      margin-top: auto; padding-bottom: 40px;
      opacity: 0.7;
    }

    /* Standard Display Lights Labels */
    .ref-group {
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
    }
    .ref-label {
      font-family: 'Roboto Condensed'; font-weight: 700;
      font-size: 0.65rem; text-transform: uppercase;
      letter-spacing: 1.5px; opacity: 0.35;
      color: var(--text-primary);
    }

    /* Background Specific Coloring */
    .display-overlay.decision-good-bg { background-color: #ffffff !important; }
    .display-overlay.decision-bad-bg  { background-color: #c0392b !important; }
    
    .decision-good .decision-flash, .decision-good .takeover-lifter-name, .decision-good .takeover-ref-label, .decision-good .decision-countdown { color: #000000 !important; }
    .decision-bad .decision-flash, .decision-bad .takeover-lifter-name, .decision-bad .takeover-ref-label, .decision-bad .decision-countdown { color: #ffffff !important; }

    /* Circle visibility on bright/dark backgrounds */
    .ref-light.white { background-color: #ffffff !important; border-color: #ffffff !important; box-shadow: none !important; }
    .decision-good-bg .ref-light.white { 
      border: 5px solid #000000 !important; 
      box-shadow: 0 0 20px rgba(0,0,0,0.15) !important; 
    }
    .decision-bad-bg .ref-light.red { 
      border: 5px solid #ffffff !important; 
      box-shadow: 0 0 30px rgba(0,0,0,0.4) !important; 
    }

    .fullscreen-hint { position: fixed; top: 10px; left: 14px; font-size: 0.65rem; color: var(--text-muted); cursor: pointer; z-index: 50; opacity: 0.35; letter-spacing: 0.5px; }
    .fullscreen-hint:hover { opacity: 0.8; cursor: default; }

    /* Offline alert border */
    .offline-border {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      border: 4px solid rgba(231, 76, 60, 0.4);
      pointer-events: none;
      z-index: 200;
      opacity: 0;
      transition: opacity 1s;
    }
    .offline-mode .offline-border { opacity: 1; }
  </style>
</head>
<body>
  <div class="offline-border"></div>
  <div class="display-fullscreen" id="display" ondblclick="toggleFullscreen()">
    <!-- Top bar -->
    <div class="display-top">
      <div class="display-top-center">
        <div class="display-meet-name" id="displayMeetName">SWAY</div>
        <div class="display-lift-info" id="displayLiftInfo"></div>
      </div>
      <div class="display-timer-corner timer" id="displayTimer">1:00</div>
    </div>

    <!-- Main body -->
    <div class="display-body">
      <!-- Left: Name, weight, plate loader, ref lights -->
      <div class="display-body-left">
        <div class="display-current-lifter">
          <div class="display-lifter-name" id="displayLifterName">Waiting...</div>
          <div class="display-attempt-info" id="displayAttemptInfo"></div>
          <div class="display-weight" id="displayWeight">—</div>
        </div>

        <div id="displayPlateLoader" style="padding: 10px 0;"></div>

        <div class="ref-lights ref-lights-lg" id="displayRefLights">
          <div class="ref-group">
            <div class="ref-light waiting" id="dispRef1"></div>
            <div class="ref-label">Left</div>
          </div>
          <div class="ref-group">
            <div class="ref-light waiting" id="dispRef2"></div>
            <div class="ref-label">Head</div>
          </div>
          <div class="ref-group">
            <div class="ref-light waiting" id="dispRef3"></div>
            <div class="ref-label">Right</div>
          </div>
        </div>

        <div class="prediction" id="displayPrediction"></div>
      </div>

      <!-- Right: Rack height badge -->
      <div class="display-body-right">
        <div class="rack-height-badge no-rack" id="rackHeightBadge">
          <div class="rack-height-label" id="rackHeightLabel">Squat Rack</div>
          <div class="rack-height-value" id="rackHeightValue">—</div>
          <div id="rackExtraInfo"></div>
        </div>
      </div>
    </div>

    <!-- Bottom bar: On Deck | Flight + Division + Mini Order | In the Hole -->
    <div class="display-bottom">
      <!-- On Deck -->
      <div class="ondeck-item">
        <div class="ondeck-label">On Deck</div>
        <div class="ondeck-name" id="onDeckName">—</div>
        <div class="ondeck-weight" id="onDeckWeight"></div>
      </div>
      
      <!-- Center: Flight/Division info + mini order -->
      <div class="display-bottom-info">
        <div class="flight-division-tag" id="flightDivisionTag"></div>
        <div class="section-label">Flight Order</div>
        <div class="mini-order-row" id="miniOrder"></div>
      </div>
      
      <!-- In the Hole -->
      <div class="ondeck-item" style="text-align:right">
        <div class="ondeck-label">In the Hole</div>
        <div class="ondeck-name" id="inHoleName">—</div>
        <div class="ondeck-weight" id="inHoleWeight"></div>
      </div>
    </div>
  </div>

  <div class="display-overlay" id="decisionOverlay">
    <div class="takeover-lifter-name" id="takeoverLifterName">NAME</div>
    <div class="decision-flash" id="decisionFlash">GOOD LIFT</div>
    
    <div class="takeover-ref-lights">
      <div class="takeover-ref-group">
        <div class="ref-light waiting" id="takeoverRef1" style="width:120px;height:120px"></div>
        <div class="takeover-ref-label">Left</div>
      </div>
      <div class="takeover-ref-group">
        <div class="ref-light waiting" id="takeoverRef2" style="width:120px;height:120px"></div>
        <div class="takeover-ref-label">Head</div>
      </div>
      <div class="takeover-ref-group">
        <div class="ref-light waiting" id="takeoverRef3" style="width:120px;height:120px"></div>
        <div class="takeover-ref-label">Right</div>
      </div>
    </div>

    <div class="decision-countdown" id="decisionCountdown"></div>
  </div>

  <div class="fullscreen-hint" ondblclick="toggleFullscreen()">Double-click for fullscreen</div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    const meetId = getParam('meetId');
    const platform = parseInt(getParam('platform') || '1');
    let displayTimer = null;
    let displayLifterId = null;
    let isFlashing = false; // Flag to prevent state reloads during decision banners
    let socketListenersRegistered = false; // Guard against duplicate socket listeners

    let meetUnits = 'kg';

    async function init() {
      try {
        const meet = await API.getMeet(meetId);
        meetUnits = meet.units || 'kg';
        document.getElementById('displayMeetName').textContent = meet.name;
        document.title = `${meet.name} — Display — SWAY`;
        // Store the configuration globally so the socket handler can use it
        window.decisionDisplaySeconds = meet.decision_display_seconds ?? 15;
      } catch (e) {
        window.decisionDisplaySeconds = 15;
      }

      displayTimer = new CompetitionTimer(document.getElementById('displayTimer'));
      displayTimer.render();

      socket.connect();
      
      // Register listeners only once
      if (!socketListenersRegistered) {
        socketListenersRegistered = true;

        socket.on('state_changed', (data) => {
          if (data.meetId === meetId && !isFlashing) loadState();
        });

        socket.on('attempt_updated', (data) => {
          if (data.meetId === meetId && !isFlashing) loadState();
        });

        socket.on('decision_made', (data) => {
          if (data.meetId !== meetId) return;
          if (data.lifterId && data.lifterId !== displayLifterId) return;
          
          // Update individual ref lights as each vote comes in
          // Use 'in' to detect the property even if it's an empty string
          if ('ref1' in data && data.ref1) document.getElementById('dispRef1').className = `ref-light ${data.ref1}`;
          if ('ref2' in data && data.ref2) document.getElementById('dispRef2').className = `ref-light ${data.ref2}`;
          if ('ref3' in data && data.ref3) document.getElementById('dispRef3').className = `ref-light ${data.ref3}`;
          
          // Final decision: stop the clock, flash result, reload state after banner expires
          if (data.result && (data.result === 'good' || data.result === 'no_good')) {
            displayTimer.stop();
            displayTimer.reset(60);
            showDecisionFlash(data.result);
            
            isFlashing = true; // Lock the display on this lifter
            
            const durationMs = (window.decisionDisplaySeconds || 15) * 1000;
            setTimeout(() => {
              isFlashing = false;
              loadState(); // Now it's safe to show the next lifter
            }, durationMs);
          }
        });

        socket.on('timer_start', (data) => { if (data.meetId !== meetId) return; displayTimer.start(data.seconds); });
        socket.on('timer_stop',  (data) => { if (data.meetId !== meetId) return; displayTimer.stop(); });
        socket.on('timer_reset', (data) => { if (data.meetId !== meetId) return; displayTimer.reset(data.seconds || 60); });
        socket.on('timer',       (data) => { if (data.meetId !== meetId) return; displayTimer.seconds = data.seconds; displayTimer.render(); });

        socket.on('reconnected', () => {
          loadState(); // Refresh TV state
          document.body.classList.remove('offline-mode');
          if (window.offlineTimeout) clearTimeout(window.offlineTimeout);
        });

        socket.on('disconnected', () => {
          // Show subtle alert after 5s
          window.offlineTimeout = setTimeout(() => {
            if (!socket.connected) document.body.classList.add('offline-mode');
          }, 5000);
        });
      }

      // Initial load
      loadState();
      
      // Periodically refresh meet config (units, etc.)
      setInterval(async () => {
        try {
          const m = await API.getMeet(meetId);
          meetUnits = m.units === 'lbs' ? 'lb' : 'kg';
          window.decisionDisplaySeconds = m.decision_display_seconds || 15;
          document.getElementById('displayMeetName').textContent = m.name;
        } catch (e) {}
      }, 5000);
    }

    async function loadState() {
      try {
        const state = await API.getMeetState(meetId);
        const order = await API.getLiftingOrder(meetId, platform, state.current_flight || 'A', state.current_lift_type || 'squat', state.current_attempt_number || 1);
        if (order.length > 0) {
          const currentIdx = order.findIndex(l => l.id === state.current_lifter_id);
          const idx = currentIdx >= 0 ? currentIdx : 0;
          updateDisplay({
            lifter: order[idx],
            attempt: order[idx]?.currentAttempt,
            liftType: state.current_lift_type || 'squat',
            attemptNumber: state.current_attempt_number || 1,
            liftingOrder: order,
            flight: state.current_flight || 'A'
          });
        }
      } catch (e) { console.log('State load error:', e); }
    }

    function updateDisplay(data) {
      const { lifter, attempt, liftType, attemptNumber, liftingOrder, flight } = data;
      
      if (!lifter) return;
      displayLifterId = lifter.id;
      
      // Update ref lights
      [1,2,3].forEach(n => {
        const refVal = attempt?.[`ref${n}`];
        document.getElementById(`dispRef${n}`).className = refVal && refVal !== '' ? `ref-light ${refVal}` : 'ref-light waiting';
      });

      document.getElementById('displayLifterName').textContent = lifter.name;

      // Attempt info: just team — no gender string here
      const parts = [];
      if (lifter.team) parts.push(lifter.team);
      document.getElementById('displayAttemptInfo').textContent = parts.join(' · ');
      
      const weight = attempt?.weight || lifter.currentWeight || 0;
      document.getElementById('displayWeight').innerHTML = weight > 0 ? `${weight} <span>${meetUnits}</span>` : '—';
      document.getElementById('displayLiftInfo').textContent = `${LIFT_NAMES[liftType] || liftType} — Attempt ${attemptNumber}`;
      
      // Plate loader
      document.getElementById('displayPlateLoader').innerHTML = weight > 0 ? renderPlateLoader(weight, meetUnits) : '';

      // ── Rack height badge ──────────────────────────────────────────────────
      const badge = document.getElementById('rackHeightBadge');
      const rackLabel = document.getElementById('rackHeightLabel');
      const rackValue = document.getElementById('rackHeightValue');
      const rackExtra = document.getElementById('rackExtraInfo');
      
      let rackHeight = '';
      let rackLabelText = '';
      let extraHtml = '';

      if (liftType === 'squat') {
        rackHeight = lifter.squat_rack_height || lifter.rack_height || '';
        rackLabelText = 'Squat Rack';
      } else if (liftType === 'bench') {
        rackHeight = lifter.bench_rack_height || lifter.rack_height || '';
        rackLabelText = 'Bench Rack';
        const safety = lifter.bench_safety_height || '4';
        const blocks = lifter.bench_blocks === 'Y' ? 'YES' : 'NO';
        extraHtml = `<div class="rack-extra-info">🛡️ Safety: ${safety}</div>
                     <div class="rack-extra-info" style="border:none;padding:0;margin-top:2px">🦶 Blocks: ${blocks}</div>`;
      }

      if (rackHeight && rackHeight.trim()) {
        badge.classList.remove('no-rack');
        rackLabel.textContent = rackLabelText;
        rackValue.textContent = rackHeight.trim();
        rackExtra.innerHTML = extraHtml;
      } else {
        badge.classList.add('no-rack');
        rackExtra.innerHTML = '';
      }

      // ── On Deck / In the Hole ──────────────────────────────────────────────
      if (liftingOrder) {
        const currentIdx = liftingOrder.findIndex(l => l.id === lifter.id);
        const onDeck = liftingOrder[currentIdx + 1];
        const inHole = liftingOrder[currentIdx + 2];
        
        document.getElementById('onDeckName').textContent = onDeck?.name || '—';
        document.getElementById('onDeckWeight').textContent = onDeck?.currentWeight ? `${onDeck.currentWeight} ${meetUnits}` : '';
        document.getElementById('inHoleName').textContent = inHole?.name || '—';
        document.getElementById('inHoleWeight').textContent = inHole?.currentWeight ? `${inHole.currentWeight} ${meetUnits}` : '';
        
        // Flight + Division tag (no gender prefix)
        const flightLabel = flight || data.flight || '';
        const divName = lifter.division_name || '';
        const wcName = lifter.weight_class_name || '';
        const tagParts = [];
        if (flightLabel) tagParts.push(`Flight ${flightLabel}`);
        if (divName) tagParts.push(divName);
        if (wcName) tagParts.push(wcName);
        document.getElementById('flightDivisionTag').textContent = tagParts.join(' · ');

        // Mini order: first names + weight
        const miniHtml = liftingOrder.slice(0, 10).map((l, i) => {
          const isCurrent = l.id === lifter.id;
          return `<span style="${isCurrent ? 'color:var(--accent-secondary);font-weight:700' : ''}">${escapeHtml(l.name.split(' ')[0])}${l.currentWeight ? ` (${l.currentWeight})` : ''}</span>`;
        }).join(' → ');
        document.getElementById('miniOrder').innerHTML = miniHtml;
      }
    }

    function showDecisionFlash(result) {
      const overlay  = document.getElementById('decisionOverlay');
      const flash    = document.getElementById('decisionFlash');
      const takeoverName = document.getElementById('takeoverLifterName');
      const countdown = document.getElementById('decisionCountdown');

      // Clear any existing timers
      if (window.fadeTimeout)      clearTimeout(window.fadeTimeout);
      if (window.countdownInterval) clearInterval(window.countdownInterval);

      // Takeover data synchronization
      const currentName = document.getElementById('displayLifterName').textContent;
      takeoverName.textContent = currentName !== 'Waiting...' ? currentName : '';
      
      // Sync Lights from main display to takeover positions
      [1,2,3].forEach(n => {
        const sourceLight = document.getElementById(`dispRef${n}`);
        const destLight = document.getElementById(`takeoverRef${n}`);
        if (sourceLight && destLight) {
          destLight.className = sourceLight.className;
        }
      });

      const totalSecs = window.decisionDisplaySeconds || 15;

      // Set colors and content
      flash.textContent = result === 'good' ? 'GOOD LIFT' : 'NO LIFT';
      flash.className   = `decision-flash`;
      overlay.className = `display-overlay show ${result === 'good' ? 'decision-good decision-good-bg' : 'decision-bad decision-bad-bg'}`;

      // Live countdown
      let remaining = totalSecs;
      countdown.textContent = `Next lifter in ${remaining}s`;
      window.countdownInterval = setInterval(() => {
        remaining--;
        if (remaining > 0) {
          countdown.textContent = `Next lifter in ${remaining}s`;
        } else {
          clearInterval(window.countdownInterval);
          countdown.textContent = '';
        }
      }, 1000);

      // Fade out and cleanup
      window.fadeTimeout = setTimeout(() => {
        overlay.classList.remove('show');
        clearInterval(window.countdownInterval);
        countdown.textContent = '';
      }, totalSecs * 1000);
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }

    init();
  </script>
</body>
</html>
