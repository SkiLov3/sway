<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results — SWAY</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .results-actions { display: flex; gap: 8px; }
    .results-table { font-size: 0.85rem; }
    .results-table th { position: sticky; top: 0; z-index: 10; }
    .results-table td { padding: 6px 8px; }
    .results-table .attempt-cell { min-width: 55px; font-size: 0.85rem; }
    .division-header { background: var(--bg-tertiary); font-weight: 700; color: var(--accent-secondary); border-bottom: 2px solid var(--accent-primary); }
    .division-header td { padding: 12px 8px; font-size: 1rem; }
    .forecasted-badge { display: inline-block; padding: 2px 8px; background: rgba(241,196,15,0.2); color: #f1c40f; border-radius: 10px; font-size: 0.7rem; font-weight: 700; margin-left: 6px; }
  </style>
</head>
<body>
  <header class="header">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="header-title" id="meetTitle">Results</div>
    <div class="header-actions">
      <button class="btn btn-outline btn-sm" id="forecastedBtn" onclick="toggleForecasted()">Forecasted</button>
      <button class="btn btn-outline btn-sm" onclick="exportResults()">📋 Export</button>
    </div>
  </header>

  <main class="container">
    <div class="table-container">
      <table class="results-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Team</th>
            <th>Place</th>
            <th>Body Wgt</th>
            <th>Squat 1</th>
            <th>Squat 2</th>
            <th>Squat 3</th>
            <th>Bench 1</th>
            <th>Bench 2</th>
            <th>Bench 3</th>
            <th>Dead 1</th>
            <th>Dead 2</th>
            <th>Dead 3</th>
            <th>Total</th>
            <th>DOTS</th>
          </tr>
        </thead>
        <tbody id="resultsBody">
          <tr><td colspan="15" class="loading"><div class="spinner"></div> Loading results...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    const meetId = getParam('meetId');
    if (!meetId) window.location = '/';
    
    let resultsData = null;
    let isForecasted = false;

    createSidebar(meetId, '', 'results');

    async function init() {
      try {
        const meet = await API.getMeet(meetId);
        document.getElementById('meetTitle').textContent = meet.name;
        document.title = `${meet.name} — Results — SWAY`;
      } catch (e) {}
      
      await loadResults();
      
      await loadResults();
      
      // Auto-refresh via WebSockets (100% event-driven, no more polling)
      socket.connect();
      socket.on('attempt_updated', () => loadResults());
      socket.on('decision_made', () => loadResults());
      socket.on('state_changed', () => loadResults());
    }

    async function loadResults() {
      try {
        resultsData = await API.getResults(meetId, isForecasted);
        renderResults();
      } catch (err) {
        showToast('Failed to load results: ' + err.message, 'error');
      }
    }

    function renderResults() {
      if (!resultsData) return;
      
      const { groups } = resultsData;
      const body = document.getElementById('resultsBody');
      let html = '';

      // Add Best Lifters section if any totals exist
      if (resultsData.bestLifters && resultsData.bestLifters.length > 0) {
        html += `
          <tr class="division-header group-header" style="background:var(--accent-glow)">
            <td colspan="15" style="border-bottom-color:var(--accent-primary)">
              <strong>🏆 Best Lifters (Top 10 by DOTS)</strong>
            </td>
          </tr>
        `;
        resultsData.bestLifters.slice(0, 10).forEach((lifter, idx) => {
          html += `<tr>`;
          html += `<td><strong>${idx + 1}. ${escapeHtml(lifter.name)}</strong></td>`;
          html += `<td style="color:var(--text-secondary)">${escapeHtml(lifter.team || '')}</td>`;
          html += `<td>—</td>`; // Place in weight class
          html += `<td>${lifter.body_weight || '—'}</td>`;
          html += `<td colspan="10" style="color:var(--text-secondary)">${escapeHtml(lifter.division_name)} / ${escapeHtml(lifter.weight_class_name)}</td>`;
          html += `<td style="font-weight:700;color:var(--accent-secondary)">${lifter.dots}</td>`;
          html += `</tr>`;
        });
        html += `<tr><td colspan="15" style="padding:16px;border:none"></td></tr>`;
      }

      for (const [key, lifters] of Object.entries(groups)) {
        const [divName, wcName] = key.split('|||');
        
        // Division + Weight Class header
        html += `
          <tr class="division-header group-header">
            <td colspan="15">
              <strong>${escapeHtml(divName)}</strong>
              <span style="color:var(--text-secondary);margin-left:8px">${escapeHtml(wcName)}</span>
              <span style="float:right;font-size:0.85rem;color:var(--text-muted)">DOTS</span>
              <span style="float:right;font-size:0.85rem;color:var(--text-muted);margin-right:24px">Total</span>
            </td>
          </tr>
        `;

        lifters.forEach(lifter => {
          const attempts = lifter.attempts || [];
          html += `<tr>`;
          html += `<td style="font-weight:700">${escapeHtml(lifter.name)}</td>`;
          html += `<td style="color:var(--text-secondary)">${escapeHtml(lifter.team || '')}</td>`;
          html += `<td class="place-cell">${lifter.place}</td>`;
          html += `<td>${lifter.body_weight || '—'}</td>`;
          
          // Squat 1-3
          for (let num = 1; num <= 3; num++) {
            const att = attempts.find(a => a.lift_type === 'squat' && a.attempt_number === num);
            html += renderAttemptCell(att, lifter, 'squat');
          }
          
          // Bench 1-3
          for (let num = 1; num <= 3; num++) {
            const att = attempts.find(a => a.lift_type === 'bench' && a.attempt_number === num);
            html += renderAttemptCell(att, lifter, 'bench');
          }
          
          // Deadlift 1-3
          for (let num = 1; num <= 3; num++) {
            const att = attempts.find(a => a.lift_type === 'deadlift' && a.attempt_number === num);
            html += renderAttemptCell(att, lifter, 'deadlift');
          }
          
          // Total and DOTS
          const isProj = lifter.isForecasted && attempts.some(a => a.result === 'pending' && a.weight > 0);
          html += `
            <td class="total-cell">
              ${lifter.total > 0 ? lifter.total : '—'}
              ${isProj ? '<div class="forecasted-badge">Projected</div>' : ''}
            </td>
          `;
          html += `
            <td style="font-weight:700">
              ${lifter.dots > 0 ? lifter.dots : '—'}
            </td>
          `;
          html += `</tr>`;
        });

        // Spacing row
        html += `<tr><td colspan="15" style="padding:16px;border:none"></td></tr>`;
      }

      if (Object.keys(groups).length === 0) {
        html = '<tr><td colspan="15" class="empty-state" style="padding:40px"><div class="empty-state-icon">📊</div><div class="empty-state-text">No results yet</div></td></tr>';
      }

      body.innerHTML = html;
    }

    function renderAttemptCell(att, lifter, liftType) {
      if (!att || !att.weight) {
        return '<td class="attempt-cell"></td>';
      }
      
      const cls = getAttemptClass(att);
      const best = getBestAttempt(lifter.attempts, liftType);
      const isBest = best && att.result === 'good' && att.weight === best.weight && att.attempt_number <= 3;
      
      return `<td class="attempt-cell ${cls} ${isBest ? 'attempt-best' : ''}">${att.weight}</td>`;
    }

    function toggleForecasted() {
      isForecasted = !isForecasted;
      const btn = document.getElementById('forecastedBtn');
      btn.classList.toggle('btn-primary', isForecasted);
      btn.classList.toggle('btn-outline', !isForecasted);
      
      loadResults(); // Reload with new calculation mode
      showToast(isForecasted ? 'Showing projected standings (Best Case)' : 'Showing actual standings');
    }

    function exportResults() {
      if (!resultsData) return;
      
      let csv = 'Division,Weight Class,Place,Name,Team,Gender,Body Weight,Squat 1,Squat 2,Squat 3,Bench 1,Bench 2,Bench 3,Deadlift 1,Deadlift 2,Deadlift 3,Total,DOTS\n';
      
      for (const [key, lifters] of Object.entries(resultsData.groups)) {
        const [divName, wcName] = key.split('|||');
        lifters.forEach(lifter => {
          const atts = lifter.attempts || [];
          const getWeight = (type, num) => {
            const a = atts.find(a => a.lift_type === type && a.attempt_number === num);
            if (!a || !a.weight) return '';
            return a.result === 'no_good' ? `-${a.weight}` : a.weight;
          };
          
          csv += `${escapeCSV(divName)},${escapeCSV(wcName)},${lifter.place},${escapeCSV(lifter.name)},${escapeCSV(lifter.team || '')},${escapeCSV(lifter.gender || 'M')},${lifter.body_weight || ''},`;
          csv += `${getWeight('squat',1)},${getWeight('squat',2)},${getWeight('squat',3)},`;
          csv += `${getWeight('bench',1)},${getWeight('bench',2)},${getWeight('bench',3)},`;
          csv += `${getWeight('deadlift',1)},${getWeight('deadlift',2)},${getWeight('deadlift',3)},`;
          csv += `${lifter.total || ''},${lifter.dots || ''}\n`;
        });
      }

      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `results_${meetId.slice(0,8)}.csv`;
      a.click();
      showToast('Results exported to CSV');
    }

    init();
  </script>
</body>
</html>
